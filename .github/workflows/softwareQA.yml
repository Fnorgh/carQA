name: Software QA Tests

on:
  workflow_dispatch:

jobs:
  run-software-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Make script executable
        run: chmod +x ./softwareQATests.sh

      - name: Run Software QA tests
        run: ./softwareQATests.sh